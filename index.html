<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Tech Education World</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:40px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#777;
  margin-bottom:20px;
}

/* INPUT */
input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#b4ff55;
  border:none;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:disabled{
  background:#ccc;
  cursor:not-allowed;
}

button:hover:not(:disabled){
  background:#9be63f;
}

/* STATUS */
#status{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

/* WHATSAPP BUTTON */
.whatsapp{
  display:block;
  text-align:center;
  margin-top:15px;
  padding:10px;
  background:#25D366;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:#666;
}

/* MOBILE */
@media(max-width:600px){
  .container{
    margin:20px;
    padding:20px;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Contact Us</h2>
<p class="subtitle">We’d love to hear from you</p>

<form id="form">

<input type="text" placeholder="Full Name" id="name" required>
<input type="email" placeholder="Email Address" id="email" required>
<input type="tel" placeholder="Phone Number" id="phone" required>

<textarea placeholder="Your Message" id="message" rows="4" required></textarea>

<button type="submit" id="submitBtn">Submit</button>

</form>

<p id="status"></p>

<!-- WhatsApp Quick Contact -->
<a href="https://wa.me/917500982742?text=Hello%20I%20want%20to%20connect%20with%20Tech%20Education%20World"
class="whatsapp" target="_blank">
Chat on WhatsApp
</a>

<div class="footer">
Tech Education World™ • Roorkee, India
</div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxmk6gdyOEt9Un1hbZLslZHLmnmBp-ojnFAaJ2XHzJjCVv2tjJHNKf5uRSFEO02dfPQ/exec";

const form = document.getElementById("form");
const status = document.getElementById("status");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function(e){
  e.preventDefault();

  btn.disabled = true;
  status.innerHTML = "⏳ Submitting...";

  const data = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    message: document.getElementById("message").value.trim()
  };

  fetch(scriptURL, {
    method:"POST",
    body:JSON.stringify(data),
    headers: { "Content-Type": "application/json" }
  })
  .then(res => res.json())
  .then(() => {
    status.innerHTML = "✅ Submitted Successfully!";
    form.reset();
    btn.disabled = false;
  })
  .catch(() => {
    status.innerHTML = "❌ Error! Please try again.";
    btn.disabled = false;
  });
});
</script>

</body>
</html>
