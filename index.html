<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Tech Education World</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

.container{
  max-width:500px;
  margin:40px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#777;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#b4ff55;
  border:none;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

#status{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Contact Us</h2>
<p class="subtitle">We’d love to hear from you</p>

<form id="form">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email Address" required>
<input type="tel" id="phone" placeholder="Phone Number" required>
<input type="text" id="address" placeholder="Address">
<textarea id="message" placeholder="Your Message" rows="4" required></textarea>

<button type="submit">Submit</button>

</form>

<p id="status"></p>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxgEujycto1hRTAA7YRHe5sgwrzq0ItWLBYGmsBoLSTsDY8XZlwJltsHHJurOTo177Z/exec";

const form = document.getElementById("form");
const status = document.getElementById("status");

// ✅ Cache inputs (best practice)
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const messageInput = document.getElementById("message");

form.addEventListener("submit", function(e){
  e.preventDefault();

  status.innerHTML = "⏳ Submitting...";

  const data = {
    name: nameInput.value.trim(),
    email: emailInput.value.trim(),
    phone: phoneInput.value.trim(),
    address: addressInput.value.trim(),
    message: messageInput.value.trim()
  };

  fetch(scriptURL, {
    method:"POST",
    mode:"no-cors",
    body: JSON.stringify(data)
  })
  .then(() => {
    status.innerHTML = "✅ Submitted Successfully!";
    form.reset();
  })
  .catch(() => {
    status.innerHTML = "❌ Failed to submit";
  });
});
</script>

</body>
</html>
