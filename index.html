<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#b4ff55;
  border:none;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

#status{
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Contact Us</h2>

<form id="form">
<input type="text" placeholder="Name" id="name" required>
<input type="email" placeholder="Email" id="email" required>
<input type="tel" placeholder="Phone" id="phone" required>
<textarea placeholder="Message" id="message" required></textarea>

<button type="submit">Submit</button>
</form>

<p id="status"></p>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycby-J5USEA01NfycsXc7S_BwaGJTrZ_vD6hqi3LQ8DtZWBxv-ZOPxUtIMyGByVN27goI/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    message: document.getElementById("message").value
  };

  fetch(scriptURL, {
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("status").innerHTML = "✅ Submitted Successfully";
    document.getElementById("form").reset();
  })
  .catch(() => {
    document.getElementById("status").innerHTML = "❌ Error submitting form";
  });
});
</script>

</body>
</html>
