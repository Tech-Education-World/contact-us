<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Tech Education World</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

.container{
  max-width:500px;
  margin:40px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#777;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#b4ff55;
  border:none;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

#status{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h2>Contact Us</h2>
<p class="subtitle">We’d love to hear from you</p>

<form id="form">

<input type="text" placeholder="Full Name" id="name" required>
<input type="email" placeholder="Email Address" id="email" required>
<input type="tel" placeholder="Phone Number" id="phone" required>
<input type="text" placeholder="Address" id="address">

<textarea placeholder="Your Message" id="message" rows="4" required></textarea>

<button type="submit">Submit</button>

</form>

<p id="status"></p>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyUvgOh5yJKxs-ZsKIjH5BY8l5pyUcG7WuZUeVfQ5Jvu0riQSIfkNs7Sd6iRj0MIVyI/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerHTML = "⏳ Submitting...";

  const data = {
    name: name.value,
    email: email.value,
    phone: phone.value,
    address: address.value,
    message: message.value
  };

  fetch(scriptURL, {
    method:"POST",
    mode: "no-cors",   // 🔥 MOST IMPORTANT FIX
    body: JSON.stringify(data)
  })
  .then(() => {
    status.innerHTML = "✅ Submitted Successfully!";
    document.getElementById("form").reset();
  })
  .catch(() => {
    status.innerHTML = "❌ Failed to submit";
  });

});
</script>

</body>
</html>
